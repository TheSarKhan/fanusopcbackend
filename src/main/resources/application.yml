spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fanus}
    username: ${DB_USER:fanus}
    password: ${DB_PASSWORD:fanus2024}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis2024}
      timeout: 2000ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:fanus-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-token-expiry-seconds: ${JWT_REFRESH_EXPIRY_S:604800}

  cookie:
    domain: ${COOKIE_DOMAIN:localhost}   # prod: .fanusopc.com
    secure: ${COOKIE_SECURE:false}       # prod: true

  email:
    provider: ${EMAIL_PROVIDER:sendpulse}
    from: ${EMAIL_FROM:noreply@fanus.az}
    from-name: ${EMAIL_FROM_NAME:Fanus Psixologiya}
    sendpulse:
      client-id: ${SENDPULSE_CLIENT_ID:}
      client-secret: ${SENDPULSE_CLIENT_SECRET:}

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

  upload:
    dir: ${UPLOAD_DIR:uploads/}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080/uploads/}

  cors:
    allowed-origin-pattern: ${CORS_ORIGIN_PATTERN:https://*.fanus.com}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
